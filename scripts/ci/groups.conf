# Linter group registry — single source of truth for group metadata.
# Format: logkey|display_name|status_context|step_name
#
# - logkey:         matches the first arg to lint-run.sh and the .outcome/.log filenames
# - display_name:   shown in summary table and step summary
# - status_context: the commit status context (prefixed with "coding-standards: ")
# - step_name:      the workflow step name (for deep-linking)
#
# To add a new group: add a line here + a step in lint.yml. That's it.

hygiene|File hygiene|file hygiene|Lint: file hygiene
cruft|Cruft & secret files|cruft & secrets|Lint: cruft & secret file blocking
gitleaks|Secret scanning|secret scanning|Lint: secret scanning (gitleaks)
typos|Typo detection|typo detection|Lint: typo detection
yaml|YAML|yaml|Lint: YAML (yamllint)
actions|GitHub Actions|github actions|Lint: GitHub Actions (actionlint + zizmor)
markdown|Markdown|markdown|Lint: markdown
commitlint|Commit messages|commit messages|Lint: commit messages (commitlint)
python|Python|python|Lint: Python (ruff)
shell|Shell hygiene|shell hygiene|Lint: shell hygiene
justfile|Justfile formatting|justfile formatting|Lint: justfile formatting
hadolint|Dockerfile|dockerfile|Lint: Dockerfile (hadolint)
tflint|Terraform|terraform|Lint: Terraform (tflint)
jscpd|Copy-paste detection|copy-paste detection|Lint: copy-paste detection (jscpd)
trivy|Trivy (IaC + deps)|trivy|Security: Trivy (IaC + deps)
semgrep|Semgrep (SAST)|semgrep|Security: Semgrep (SAST)
extra|Extra checks|extra checks|Repo: extra checks
