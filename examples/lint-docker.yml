# Example consumer workflow — coding-standards Docker image
# Drop this into .github/workflows/lint.yml or .gitea/workflows/lint.yml
#
# Prerequisites:
#   1. Add .mega-linter.yml to your repo root with EXTENDS URL (see consumer-guide.md)
#   2. Optionally add your own ruff.toml, .yamllint, etc. for per-repo overrides
name: Lint

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for gitleaks + commitlint

      # Standard linting — inherits config via EXTENDS URL in .mega-linter.yml
      - uses: alxleo/coding-standards/docker-action@main

      # Optional: auto-fix and push
      # - uses: alxleo/coding-standards/docker-action@main
      #   with:
      #     apply-fixes: 'all'
      # - uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "style: auto-fix lint issues"
