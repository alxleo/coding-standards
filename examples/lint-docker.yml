# Example consumer workflow — MegaLinter Docker image
# Drop this into .github/workflows/lint.yml or .gitea/workflows/lint.yml
name: Lint

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history for gitleaks + commitlint

      - name: Lint
        run: |
          docker run --rm \
            -v "$PWD:/tmp/lint" \
            ghcr.io/alxleo/coding-standards:latest

      - name: Post commit statuses
        if: always()
        env:
          GITEA_URL: ${{ vars.GITEA_URL || '' }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pin to a specific commit SHA — update when upgrading coding-standards
          python3 <(curl -fsSL https://raw.githubusercontent.com/alxleo/coding-standards/651d42e6936cff71b1f76918526a67fccb0f6422/scripts/report-statuses.py) \
            megalinter-reports/mega-linter-report.json

      # Optional: auto-fix and push
      # - name: Lint (auto-fix)
