# Override file for coding-standards workflow.
# Place this at .coding-standards.yml in your repo root.
#
# skip-hooks: list of linter groups to skip for this repo.
# Either everything passes or it's explicit here that it's ignored.
#
# Available groups:
#   hygiene, cruft, gitleaks, typos, yaml, actions, markdown,
#   commitlint, python, shell, justfile, jscpd, trivy, semgrep
#
# overrides: per-tool config files that extend the coding-standards baseline.
# Your config file must use the tool's native extends/inherit syntax to
# chain back to the baseline config in .coding-standards/lint-configs-626465/.
#
# Supported tools (with extends):
#   yamllint      — extends: .coding-standards/lint-configs-626465/.yamllint.baseline
#   gitleaks      — [extend] path = ".coding-standards/lint-configs-626465/.gitleaks.baseline.toml"
#   markdownlint  — extends: .coding-standards/lint-configs-626465/.markdownlint-cli2.baseline.yaml
#   commitlint    — import from baseline file
#
# Tools without extends support use full replacement:
#   Place your own .hadolint.yaml, .jscpd.json, or .prettierrc at repo root.

# skip-hooks:
#   - commitlint    # Skip if repo uses a different commit convention
#   - python        # Skip if repo doesn't use Python
#   - justfile      # Skip if repo has no justfiles
#   - actions       # Skip if repo has no GitHub Actions workflows
#   - trivy         # Skip vulnerability scanning
#   - semgrep       # Skip SAST scanning

# overrides:
#   yamllint: .yamllint.yml           # Your file extending our baseline
#   gitleaks: .gitleaks.toml          # Your allowlists extending our baseline
#   markdownlint: .markdownlint.yaml  # Your rules extending our baseline
