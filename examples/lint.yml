# Example consumer workflow — drop this into .github/workflows/lint.yml
name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write # allows per-linter status checks on PRs

jobs:
  lint:
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    uses: alxleo/coding-standards/.github/workflows/lint.yml@v1
    # with:
    #   skip-hooks: "commitlint,python"   # optional: skip groups
