descriptor_id: REPOSITORY
descriptor_type: other
linters:
  - linter_name: just-fmt
    name: REPOSITORY_JUST_FMT
    descriptor_flavors:
      - cupcake
    cli_lint_mode: file
    linter_text: Check justfile formatting
    linter_url: https://github.com/casey/just
    cli_executable: just
    cli_lint_extra_args:
      - --fmt
      - --check
      - --unstable
      - -f
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    file_names_regex:
      - (^|/)justfile$
      - (^|/)Justfile$
    file_extensions: []
