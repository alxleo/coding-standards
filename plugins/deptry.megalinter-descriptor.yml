descriptor_id: REPOSITORY
descriptor_type: other
lint_all_files: true
linters:
  - linter_name: deptry
    name: REPOSITORY_DEPTRY
    descriptor_flavors:
      - cupcake
    cli_lint_mode: project
    linter_text: Find unused, missing, and transitive Python dependencies
    linter_url: https://github.com/fpgmaas/deptry
    cli_executable: deptry
    cli_lint_extra_args:
      - .
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    files_sub_directory: ""
    file_extensions: []
    active_only_if_file_found:
      - pyproject.toml
