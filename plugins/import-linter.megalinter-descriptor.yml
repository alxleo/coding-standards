descriptor_id: REPOSITORY
descriptor_type: other
lint_all_files: true
linters:
  - linter_name: import-linter
    name: REPOSITORY_IMPORT_LINTER
    descriptor_flavors:
      - cupcake
    cli_lint_mode: project
    linter_text: Enforce Python import contracts between architectural layers
    linter_url: https://github.com/seddonym/import-linter
    cli_executable: lint-imports
    cli_lint_extra_args: []
    cli_help_arg_name: --help
    cli_version_arg_name: --help
    files_sub_directory: ""
    file_extensions: []
    active_only_if_file_found:
      - pyproject.toml
