descriptor_id: REPOSITORY
descriptor_type: other
lint_all_files: true
linters:
  - linter_name: publint
    name: REPOSITORY_PUBLINT
    descriptor_flavors:
      - cupcake
    cli_lint_mode: project
    linter_text: Validate package.json exports and main/module/types fields
    linter_url: https://publint.dev/
    cli_executable: publint
    cli_lint_extra_args: []
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    files_sub_directory: ""
    file_extensions: []
    active_only_if_file_found:
      - package.json
