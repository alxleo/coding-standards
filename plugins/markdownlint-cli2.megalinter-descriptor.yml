descriptor_id: MARKDOWN
descriptor_type: tooling_format
lint_all_files: true
linters:
  - linter_name: markdownlint
    name: MARKDOWN_MARKDOWNLINT
    descriptor_flavors:
      - cupcake
    cli_lint_mode: list_of_files
    linter_text: Lint Markdown files (cli2 — supports .markdownlint-cli2.yaml config format)
    linter_url: https://github.com/DavidAnson/markdownlint-cli2
    cli_executable: markdownlint-cli2
    cli_config_arg_name: "--config"
    config_file_name: .markdownlint-cli2.yaml
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    file_extensions:
      - .md
      - .mdx
      - .markdown
