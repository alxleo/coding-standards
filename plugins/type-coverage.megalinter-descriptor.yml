descriptor_id: REPOSITORY
descriptor_type: other
lint_all_files: true
linters:
  - linter_name: type-coverage
    name: REPOSITORY_TYPE_COVERAGE
    descriptor_flavors:
      - cupcake
    cli_lint_mode: project
    linter_text: Measure TypeScript type coverage (progressive any ratchet)
    linter_url: https://github.com/plantain-00/type-coverage
    cli_executable: type-coverage
    cli_lint_extra_args:
      - "--at-least"
      - "80"
      - "--strict"
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    files_sub_directory: ""
    file_extensions: []
    active_only_if_file_found:
      - tsconfig.json
