descriptor_id: BASH
descriptor_type: language
lint_all_files: true
linters:
  - linter_name: shellcheck
    name: BASH_SHELLCHECK
    descriptor_flavors:
      - cupcake
    cli_lint_mode: list_of_files
    linter_text: Lint shell scripts (overrides built-in — uses --rcfile instead of stale -c)
    linter_url: https://www.shellcheck.net/
    cli_executable: shellcheck
    cli_config_arg_name: "--rcfile"
    config_file_name: .shellcheckrc
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    file_extensions:
      - .sh
      - .bash
    file_names_regex:
      - (^|/)\.bashrc$
      - (^|/)\.bash_profile$
