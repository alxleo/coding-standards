descriptor_id: REPOSITORY
descriptor_type: other
lint_all_files: true
linters:
  - linter_name: attw
    name: REPOSITORY_ATTW
    descriptor_flavors:
      - cupcake
    cli_lint_mode: project
    linter_text: Check TypeScript declaration files match runtime behavior
    linter_url: https://arethetypeswrong.github.io/
    cli_executable: attw
    cli_lint_extra_args:
      - "--pack"
      - "."
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    files_sub_directory: ""
    file_extensions: []
    active_only_if_file_found:
      - tsconfig.json
