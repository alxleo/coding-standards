# coding-standards lint action — runs the MegaLinter image in CI.
#
# Works on both GitHub Actions and Gitea Actions.
# Uses composite action with docker run (more portable than using: docker).
#
# Env var passthrough: write a .megalinter.env file in the workspace
# before calling this action. It's auto-discovered and forwarded.
#
# Usage:
#   - uses: alxleo/coding-standards/docker-action@main
#     with:
#       apply-fixes: 'all'
name: coding-standards-lint
description: Run centralized MegaLinter linting via Docker container

inputs:
  apply-fixes:
    description: "Set to 'all' to auto-fix formatting issues"
    required: false
    default: "none"
  image:
    description: "Docker image to use"
    required: false
    default: "ghcr.io/alxleo/coding-standards:latest"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CS_IMAGE: ${{ inputs.image }}
        CS_APPLY_FIXES: ${{ inputs.apply-fixes }}
      run: |
        # Use GITHUB_WORKSPACE env var (set by runner) instead of
        # ${{ github.workspace }} (expression context). On Gitea Actions,
        # composite action expressions resolve differently for sibling
        # Docker container volume mounts.
        ws="${GITHUB_WORKSPACE:-$(pwd)}"

        # Auto-discover env file from workspace (avoids broken
        # composite action input resolution on Gitea).
        env_file="${ws}/.megalinter.env"
        env_flag=""
        if [ -f "$env_file" ]; then
          env_flag="--env-file ${env_file}"
        fi

        docker run --rm \
          -v "${ws}:/tmp/lint" \
          -e DEFAULT_WORKSPACE=/tmp/lint \
          -e APPLY_FIXES="${CS_APPLY_FIXES}" \
          -e WORKSPACE_UID="$(id -u)" \
          -e WORKSPACE_GID="$(id -g)" \
          ${env_flag} \
          "${CS_IMAGE}"
