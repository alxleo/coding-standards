# Mutation testing — runs Stryker on changed files only (incremental).
# Add as a separate CI job alongside the lint workflow.
name: Mutation testing
on:
  pull_request:
jobs:
  mutate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx stryker run --incremental --since origin/main
