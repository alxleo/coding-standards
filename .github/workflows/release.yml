---
# Auto-release on successful push to main.
#
# Creates a new patch release (v1.x.y) and moves the floating v1 tag
# so consumer repos pinned to @v1 get updates automatically.
name: Release

on:
  # Safe: only reads code from main, no artifact consumption from triggering run.
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # persist-credentials needed for git tag + push in the last step
          persist-credentials: true # zizmor: ignore[artipacked]

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail

          # Find the latest v1.x.y tag
          latest=$(git tag -l 'v1.*.*' --sort=-v:refname | head -1)

          if [ -z "$latest" ]; then
            echo "next=v1.0.0" >> "$GITHUB_OUTPUT"
            echo "First release: v1.0.0"
          else
            # Parse major.minor.patch
            IFS='.' read -r major minor patch <<< "${latest#v}"

            # Check commit messages since last tag for version bump signals
            commits=$(git log "${latest}..HEAD" --pretty=format:"%s" 2>/dev/null || echo "")

            if echo "$commits" | grep -qiE '^feat(\(|:|!)'; then
              # feat: or feat! → bump minor
              minor=$((minor + 1))
              patch=0
            else
              # Everything else → bump patch
              patch=$((patch + 1))
            fi

            echo "next=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
            echo "Next release: v${major}.${minor}.${patch} (previous: ${latest})"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.next }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes

      - name: Update floating v1 tag
        run: |
          git tag -f v1
          git push origin v1 --force
