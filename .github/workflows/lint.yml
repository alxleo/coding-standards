---
# Reusable lint workflow — the main entry point for consumer repos.
#
# Each linter group runs as a separate visible step in the GitHub Actions UI.
# Consumer repos call this with:
#
#   jobs:
#     lint:
#       uses: alxleo/coding-standards/.github/workflows/lint.yml@v1
#
name: Lint

on:
  workflow_call:
    inputs:
      skip-hooks:
        type: string
        default: ''
        description: 'Comma-separated linter groups to skip'
      config-file:
        type: string
        default: '.coding-standards.yml'
        description: 'Path to override config file'
      python-version:
        type: string
        default: '3.13'
        description: 'Python version'
      node-version:
        type: string
        default: '22'
        description: 'Node.js version'

permissions:
  contents: read
  statuses: write

env:
  JUST_VERSION: '1.46.0'
  TOFU_VERSION: '1.11.5'
  TFLINT_VERSION: '0.61.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # ── Fetch coding-standards configs ──────────────────────
      - name: Checkout coding-standards
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: alxleo/coding-standards
          path: .coding-standards
          sparse-checkout: |
            lint-configs-626465
            scripts/hooks
          persist-credentials: false

      # ── Setup toolchain ──────────────────────────────────────
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          enable-cache: true
          cache-dependency-glob: ""

      - name: Install Python
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Cache pre-commit environments
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      # ── Parse overrides + apply configs ────────────────────
      - name: Apply coding-standards configs
        id: config
        env:
          CONFIG_FILE: ${{ inputs.config-file }}
          INPUT_SKIP: ${{ inputs.skip-hooks }}
        run: |
          set -euo pipefail

          # ── Parse skip overrides ────────────────────────────
          SKIP_FROM_OVERRIDE=""
          if [ -f "$CONFIG_FILE" ]; then
            echo "Found override file: $CONFIG_FILE"
            SKIP_FROM_OVERRIDE=$(python3 -c "
          import yaml, sys
          try:
              with open('$CONFIG_FILE') as f:
                  cfg = yaml.safe_load(f) or {}
              hooks = cfg.get('skip-hooks', [])
              print(','.join(hooks) if isinstance(hooks, list) else str(hooks))
          except Exception:
              print('')
          " 2>/dev/null || echo "")
          fi

          SKIP=""
          if [ -n "$INPUT_SKIP" ]; then
            SKIP="$INPUT_SKIP"
          fi
          if [ -n "$SKIP_FROM_OVERRIDE" ]; then
            if [ -n "$SKIP" ]; then
              SKIP="$SKIP,$SKIP_FROM_OVERRIDE"
            else
              SKIP="$SKIP_FROM_OVERRIDE"
            fi
          fi
          echo "skip-hooks=$SKIP" >> "$GITHUB_OUTPUT"
          if [ -n "$SKIP" ]; then
            echo "Will skip: $SKIP"
          fi

          # ── Copy configs (skip if consumer has their own) ──
          CS=".coding-standards/lint-configs-626465"
          configs=(
            .gitleaks.toml
            .markdownlint-cli2.yaml
            .shellcheckrc
            .yamllint
            .hadolint.yaml
            .jscpd.json
            .prettierrc
            .editorconfig
            .mega-linter.yml
            commitlint.config.mjs
          )
          for cfg in "${configs[@]}"; do
            if [ ! -f "$cfg" ]; then
              cp "$CS/$cfg" "$cfg"
              echo "  Applied: $cfg"
            else
              echo "  Kept (consumer override): $cfg"
            fi
          done

          # Always apply pre-commit config — this IS the standard
          cp "$CS/.pre-commit-config.yaml" .pre-commit-config.yaml
          echo "  Applied: .pre-commit-config.yaml"

          # Apply custom hook scripts
          mkdir -p scripts/hooks
          cp .coding-standards/scripts/hooks/* scripts/hooks/ 2>/dev/null || true
          chmod +x scripts/hooks/* 2>/dev/null || true
          echo "  Applied: scripts/hooks/*"

      - name: Export skip list
        env:
          SKIP_VALUE: ${{ steps.config.outputs.skip-hooks }}
        run: echo "SKIP_HOOKS=$SKIP_VALUE" >> "$GITHUB_ENV" # zizmor: ignore[github-env]

      # ── Self-selecting tool installs (cached, version-pinned) ─

      # just
      - name: Cache just binary
        if: hashFiles('**/justfile', '**/Justfile') != ''
        id: cache-just
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.just/bin
          key: just-${{ runner.os }}-${{ env.JUST_VERSION }}

      - name: Install just
        if: hashFiles('**/justfile', '**/Justfile') != '' && steps.cache-just.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.just/bin && cd /tmp
          JUST_VERSION="${{ env.JUST_VERSION }}"
          JUST_TARBALL="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          BASE_URL="https://github.com/casey/just/releases/download/${JUST_VERSION}"
          curl -fsSLO "${BASE_URL}/${JUST_TARBALL}"
          curl -fsSLO "${BASE_URL}/SHA256SUMS"
          grep "  ${JUST_TARBALL}" SHA256SUMS | sha256sum -c -
          tar -xzf "${JUST_TARBALL}" -C ~/.just/bin just

      - name: Add just to PATH
        if: hashFiles('**/justfile', '**/Justfile') != ''
        run: echo "$HOME/.just/bin" >> "$GITHUB_PATH" # zizmor: ignore[github-env]

      # OpenTofu
      - name: Cache OpenTofu binary
        if: hashFiles('**/*.tf') != ''
        id: cache-tofu
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.tofu/bin
          key: tofu-${{ runner.os }}-${{ env.TOFU_VERSION }}

      - name: Install OpenTofu
        if: hashFiles('**/*.tf') != '' && steps.cache-tofu.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.tofu/bin && cd /tmp
          TOFU_VERSION="${{ env.TOFU_VERSION }}"
          TOFU_ZIP="tofu_${TOFU_VERSION}_linux_amd64.zip"
          BASE_URL="https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}"
          curl -fsSLO "${BASE_URL}/${TOFU_ZIP}"
          curl -fsSLO "${BASE_URL}/tofu_${TOFU_VERSION}_SHA256SUMS"
          grep "  ${TOFU_ZIP}" "tofu_${TOFU_VERSION}_SHA256SUMS" | sha256sum -c -
          unzip -o "${TOFU_ZIP}" tofu -d ~/.tofu/bin
          chmod +x ~/.tofu/bin/tofu

      - name: Add OpenTofu to PATH
        if: hashFiles('**/*.tf') != ''
        run: echo "$HOME/.tofu/bin" >> "$GITHUB_PATH" # zizmor: ignore[github-env]

      # TFLint
      - name: Cache TFLint binary
        if: hashFiles('**/*.tf') != ''
        id: cache-tflint
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.tflint/bin
          key: tflint-${{ runner.os }}-${{ env.TFLINT_VERSION }}

      - name: Install TFLint
        if: hashFiles('**/*.tf') != '' && steps.cache-tflint.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.tflint/bin && cd /tmp
          TFLINT_VERSION="v${{ env.TFLINT_VERSION }}"
          TFLINT_ZIP="tflint_linux_amd64.zip"
          BASE_URL="https://github.com/terraform-linters/tflint/releases/download/${TFLINT_VERSION}"
          curl -fsSLO "${BASE_URL}/${TFLINT_ZIP}"
          curl -fsSLO "${BASE_URL}/checksums.txt"
          grep "  ${TFLINT_ZIP}" checksums.txt | sha256sum -c -
          unzip -o "${TFLINT_ZIP}" -d ~/.tflint/bin
          chmod +x ~/.tflint/bin/tflint

      - name: Add TFLint to PATH
        if: hashFiles('**/*.tf') != ''
        run: echo "$HOME/.tflint/bin" >> "$GITHUB_PATH" # zizmor: ignore[github-env]

      # ── Install pre-commit hooks ─────────────────────────────
      - name: Install pre-commit hooks
        run: uvx pre-commit install-hooks

      # ══════════════════════════════════════════════════════════
      # Individual linter groups — each step visible in the UI.
      # continue-on-error: true so all groups run even if one fails.
      # ══════════════════════════════════════════════════════════

      - name: Create lint helpers
        run: |
          mkdir -p /tmp/lint-results
          cat > /tmp/lint-run.sh << 'HELPER'
          #!/usr/bin/env bash
          # Usage: /tmp/lint-run.sh <logkey> <command...>
          # Wraps output in a collapsed ::group::, captures to log file,
          # and on failure shows only the meaningful error lines.
          set -uo pipefail
          logkey="$1"; shift
          logfile="/tmp/lint-results/${logkey}.log"

          echo "::group::Full output"
          "$@" 2>&1 | tee "$logfile"
          rc=${PIPESTATUS[0]}
          echo "::endgroup::"

          if [ $rc -ne 0 ]; then
            echo ""
            echo "── Failures ─────────────────────────────"
            # Show hook pass/fail status lines + first meaningful errors
            awk '
              /\.{3,}(Passed|Failed)/ { print }
              /(Failed|ERROR|Error:|error:|warning:)/ && !/^\[INFO\]/ && !/\.{3,}/ { if (n++ < 20) print }
            ' "$logfile"
          fi
          exit $rc
          HELPER
          chmod +x /tmp/lint-run.sh

      - name: "Lint: file hygiene"
        id: hygiene
        if: "!contains(env.SKIP_HOOKS, 'hygiene')"
        continue-on-error: true
        run: |
          /tmp/lint-run.sh hygiene bash -c '
            rc=0
            uvx pre-commit run check-yaml --all-files || rc=1
            uvx pre-commit run check-json --all-files || rc=1
            uvx pre-commit run check-toml --all-files || rc=1
            uvx pre-commit run check-merge-conflict --all-files || rc=1
            uvx pre-commit run check-added-large-files --all-files || rc=1
            uvx pre-commit run detect-private-key --all-files || rc=1
            uvx pre-commit run end-of-file-fixer --all-files || rc=1
            uvx pre-commit run trailing-whitespace --all-files || rc=1
            uvx pre-commit run check-case-conflict --all-files || rc=1
            uvx pre-commit run check-executables-have-shebangs --all-files || rc=1
            uvx pre-commit run check-shebang-scripts-are-executable --all-files || rc=1
            exit $rc
          '

      - name: "Lint: cruft & secret file blocking"
        id: cruft
        if: "!contains(env.SKIP_HOOKS, 'cruft')"
        continue-on-error: true
        run: |
          /tmp/lint-run.sh cruft bash -c '
            rc=0
            uvx pre-commit run forbid-cruft-files --all-files || rc=1
            uvx pre-commit run block-secret-files --all-files || rc=1
            uvx pre-commit run verify-sops-encryption --all-files || rc=1
            exit $rc
          '

      - name: "Lint: secret scanning (gitleaks)"
        id: gitleaks
        if: "!contains(env.SKIP_HOOKS, 'gitleaks')"
        continue-on-error: true
        run: /tmp/lint-run.sh gitleaks uvx pre-commit run gitleaks --all-files

      - name: "Lint: typo detection"
        id: typos
        if: "!contains(env.SKIP_HOOKS, 'typos')"
        continue-on-error: true
        run: /tmp/lint-run.sh typos uvx pre-commit run typos --all-files

      - name: "Lint: YAML (yamllint)"
        id: yaml
        if: "!contains(env.SKIP_HOOKS, 'yaml')"
        continue-on-error: true
        run: /tmp/lint-run.sh yaml uvx pre-commit run yamllint --all-files

      - name: "Lint: GitHub Actions (actionlint + zizmor)"
        id: actions
        if: "!contains(env.SKIP_HOOKS, 'actions')"
        continue-on-error: true
        run: |
          /tmp/lint-run.sh actions bash -c '
            rc=0
            uvx pre-commit run actionlint --all-files || rc=1
            uvx pre-commit run zizmor --all-files || rc=1
            exit $rc
          '

      - name: "Lint: markdown"
        id: markdown
        if: "!contains(env.SKIP_HOOKS, 'markdown')"
        continue-on-error: true
        run: /tmp/lint-run.sh markdown uvx pre-commit run markdownlint-cli2 --all-files

      - name: "Lint: commit messages (commitlint)"
        id: commitlint
        if: "!contains(env.SKIP_HOOKS, 'commitlint')"
        continue-on-error: true
        run: /tmp/lint-run.sh commitlint uvx pre-commit run commitlint --all-files

      - name: "Lint: Python (ruff)"
        id: python
        if: "!contains(env.SKIP_HOOKS, 'python')"
        continue-on-error: true
        run: |
          /tmp/lint-run.sh python bash -c '
            rc=0
            uvx pre-commit run ruff --all-files || rc=1
            uvx pre-commit run ruff-format --all-files || rc=1
            exit $rc
          '

      - name: "Lint: shell hygiene"
        id: shell
        if: "!contains(env.SKIP_HOOKS, 'shell')"
        continue-on-error: true
        run: |
          /tmp/lint-run.sh shell bash -c '
            rc=0
            uvx pre-commit run pin-npm-versions --all-files || rc=1
            uvx pre-commit run temp-file-needs-trap --all-files || rc=1
            uvx pre-commit run forbid-bare-python --all-files || rc=1
            exit $rc
          '

      - name: "Lint: justfile formatting"
        id: justfile
        if: "!contains(env.SKIP_HOOKS, 'justfile')"
        continue-on-error: true
        run: /tmp/lint-run.sh justfile uvx pre-commit run just-fmt-check --all-files

      - name: "Lint: copy-paste detection (jscpd)"
        id: jscpd
        if: "!contains(env.SKIP_HOOKS, 'jscpd')"
        continue-on-error: true
        run: /tmp/lint-run.sh jscpd bash -c 'npx jscpd@4 --config .jscpd.json . || true'

      - name: "Security: Trivy (IaC + deps)"
        id: trivy
        if: "!contains(env.SKIP_HOOKS, 'trivy')"
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          output: /tmp/lint-results/trivy.log

      - name: "Security: Semgrep (SAST)"
        id: semgrep
        if: "!contains(env.SKIP_HOOKS, 'semgrep')"
        continue-on-error: true
        run: /tmp/lint-run.sh semgrep uvx semgrep scan --config auto --error --quiet .

      # ══════════════════════════════════════════════════════════
      # Report per-group commit statuses (GitHub + Gitea compatible)
      # ══════════════════════════════════════════════════════════
      - name: Report lint statuses
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          HYGIENE: ${{ steps.hygiene.outcome }}
          CRUFT: ${{ steps.cruft.outcome }}
          GITLEAKS: ${{ steps.gitleaks.outcome }}
          TYPOS: ${{ steps.typos.outcome }}
          YAML: ${{ steps.yaml.outcome }}
          ACTIONS: ${{ steps.actions.outcome }}
          MARKDOWN: ${{ steps.markdown.outcome }}
          COMMITLINT: ${{ steps.commitlint.outcome }}
          PYTHON: ${{ steps.python.outcome }}
          SHELL_LINT: ${{ steps.shell.outcome }}
          JUSTFILE: ${{ steps.justfile.outcome }}
          JSCPD: ${{ steps.jscpd.outcome }}
          TRIVY: ${{ steps.trivy.outcome }}
          SEMGREP: ${{ steps.semgrep.outcome }}
        run: |
          set -euo pipefail

          # ── Resolve job URL + step numbers for deep links ─────
          declare -A STEP_URLS
          JOB_JSON=$(curl -fsS \
            -H "Authorization: token ${GH_TOKEN}" \
            "${API_URL}/repos/${REPO}/actions/runs/${RUN_ID}/jobs" 2>/dev/null) || true

          if [ -n "$JOB_JSON" ]; then
            while IFS=$'\t' read -r step_num step_name; do
              STEP_URLS["$step_name"]="$step_num"
            done < <(printf '%s' "$JOB_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for job in data.get('jobs', []):
              if 'Lint' in job.get('name', ''):
                  job_url = job.get('html_url', '')
                  for step in job.get('steps', []):
                      num = step.get('number', '')
                      name = step.get('name', '')
                      if job_url and num:
                          print(f'{job_url}#step:{num}:1\t{name}')
                  break
          " 2>/dev/null) || true
          fi

          get_target_url() {
            local step_name="$1"
            if [ -n "${STEP_URLS[$step_name]:-}" ]; then
              echo "${STEP_URLS[$step_name]}"
            else
              echo "$RUN_URL"
            fi
          }

          # ── Extract first meaningful error line from lint log ──
          extract_hint() {
            local logfile="/tmp/lint-results/$1.log"
            if [ ! -f "$logfile" ]; then
              echo ""
              return
            fi
            grep -m1 -E '(Failed|ERROR|Error:|error:)' "$logfile" \
              | sed 's/^[[:space:]]*//' \
              | head -c 140 || echo ""
          }

          post_status() {
            local context="$1" outcome="$2" logkey="$3" step_name="$4"
            local state description target_url

            case "$outcome" in
              success)  state="success"; description="Passed" ;;
              failure)
                state="failure"
                description=$(extract_hint "$logkey")
                if [ -z "$description" ]; then
                  description="Failed"
                fi
                ;;
              skipped)  return 0 ;;
              *)        return 0 ;;
            esac

            target_url=$(get_target_url "$step_name")
            # Escape quotes in description for JSON
            description=$(printf '%s' "$description" | sed 's/"/\\"/g')

            curl -fsS -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API_URL}/repos/${REPO}/statuses/${SHA}" \
              -d "{
                \"state\": \"${state}\",
                \"context\": \"coding-standards: ${context}\",
                \"description\": \"${description}\",
                \"target_url\": \"${target_url}\"
              }" > /dev/null
            echo "  Posted status: ${context} → ${state} (${description})"
          }

          post_status "file hygiene"         "$HYGIENE"     hygiene    "Lint: file hygiene"
          post_status "cruft & secrets"      "$CRUFT"       cruft      "Lint: cruft & secret file blocking"
          post_status "secret scanning"      "$GITLEAKS"    gitleaks   "Lint: secret scanning (gitleaks)"
          post_status "typo detection"       "$TYPOS"       typos      "Lint: typo detection"
          post_status "yaml"                 "$YAML"        yaml       "Lint: YAML (yamllint)"
          post_status "github actions"       "$ACTIONS"     actions    "Lint: GitHub Actions (actionlint + zizmor)"
          post_status "markdown"             "$MARKDOWN"    markdown   "Lint: markdown"
          post_status "commit messages"      "$COMMITLINT"  commitlint "Lint: commit messages (commitlint)"
          post_status "python"               "$PYTHON"      python     "Lint: Python (ruff)"
          post_status "shell hygiene"        "$SHELL_LINT"  shell      "Lint: shell hygiene"
          post_status "justfile formatting"  "$JUSTFILE"    justfile   "Lint: justfile formatting"
          post_status "copy-paste detection" "$JSCPD"       jscpd      "Lint: copy-paste detection (jscpd)"
          post_status "trivy"                "$TRIVY"       trivy      "Security: Trivy (IaC + deps)"
          post_status "semgrep"              "$SEMGREP"     semgrep    "Security: Semgrep (SAST)"

      # ══════════════════════════════════════════════════════════
      # Summary
      # ══════════════════════════════════════════════════════════
      - name: Summary
        if: always()
        env:
          HYGIENE: ${{ steps.hygiene.outcome }}
          CRUFT: ${{ steps.cruft.outcome }}
          GITLEAKS: ${{ steps.gitleaks.outcome }}
          TYPOS: ${{ steps.typos.outcome }}
          YAML: ${{ steps.yaml.outcome }}
          ACTIONS: ${{ steps.actions.outcome }}
          MARKDOWN: ${{ steps.markdown.outcome }}
          COMMITLINT: ${{ steps.commitlint.outcome }}
          PYTHON: ${{ steps.python.outcome }}
          SHELL: ${{ steps.shell.outcome }}
          JUSTFILE: ${{ steps.justfile.outcome }}
          JSCPD: ${{ steps.jscpd.outcome }}
          TRIVY: ${{ steps.trivy.outcome }}
          SEMGREP: ${{ steps.semgrep.outcome }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║       coding-standards summary       ║"
          echo "╠══════════════════════════════════════╣"

          FAILED=0
          SUMMARY_ROWS=""

          report() {
            local name="$1" result="$2"
            case "$result" in
              success)
                printf "║  %-28s  %s  ║\n" "$name" "pass"
                ;;
              failure)
                printf "║  %-28s  %s  ║\n" "$name" "FAIL"
                FAILED=1
                SUMMARY_ROWS="${SUMMARY_ROWS}$(printf '| :x: FAIL | **%s** |\n' "$name")"
                ;;
              skipped)
                printf "║  %-28s  %s  ║\n" "$name" "skip"
                ;;
              *)
                printf "║  %-28s  %s  ║\n" "$name" "----"
                ;;
            esac
          }

          report "File hygiene"          "$HYGIENE"
          report "Cruft & secret files"  "$CRUFT"
          report "Secret scanning"       "$GITLEAKS"
          report "Typo detection"        "$TYPOS"
          report "YAML"                  "$YAML"
          report "GitHub Actions"        "$ACTIONS"
          report "Markdown"              "$MARKDOWN"
          report "Commit messages"       "$COMMITLINT"
          report "Python"                "$PYTHON"
          report "Shell hygiene"         "$SHELL"
          report "Justfile formatting"   "$JUSTFILE"
          report "Copy-paste detection"  "$JSCPD"
          report "Trivy (IaC + deps)"    "$TRIVY"
          report "Semgrep (SAST)"        "$SEMGREP"

          echo "╚══════════════════════════════════════╝"
          echo ""

          # Write GitHub Step Summary — only failures shown to avoid noise
          {
            if [ "$FAILED" -eq 1 ]; then
              echo "### :x: coding-standards — failures detected"
              echo ""
              echo "| Status | Check |"
              echo "|--------|-------|"
              printf '%s' "$SUMMARY_ROWS"
              echo ""
              echo "> Click the failed step names in the workflow log for details."
            else
              echo "### :white_check_mark: coding-standards — all checks passed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more linter groups failed. See individual steps above for details."
            exit 1
          fi

          echo "All checks passed."
