---
# CI — two-tier feedback.
#   1. Fast checks (~15s): ruff, conftest, semgrep, pytest, pre-commit, drift checks
#   2. Image self-lint (via composite action): runs the published image
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Fast feedback — no Docker, no image pull. Tests configs and policies directly.
  fast-checks:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: false

      - name: Ruff lint + format check
        run: |
          uvx ruff check --config lint-configs-626465/ruff.toml .
          uvx ruff format --check --config lint-configs-626465/ruff.toml .

      - name: Semgrep rule validation
        run: uvx semgrep scan --config semgrep-rules/ --validate

      - name: Pytest
        run: uv run --with pydantic --with pyyaml --with pytest pytest test/ -v

      - name: Catalog drift check
        run: uv run --with pydantic --with pyyaml python3 scripts/generate_catalog.py --check

      - name: CI smoke test coverage check
        run: python3 scripts/hooks/check-ci-json-coverage

      - name: Pre-commit
        env:
          SKIP: just-fmt-check,caddy-fmt-check,hadolint-docker
        run: |
          # Self-test: this repo IS coding-standards, so .coding-standards → .
          ln -sf . .coding-standards
          uvx pre-commit run --all-files -c lint-configs-626465/.pre-commit-config.yaml

  # Image self-lint — runs the published image against this repo.
  # Uses :latest from GHCR (tests the shipped image, not local changes).
  self-lint:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: alxleo/coding-standards/docker-action@18575725c90d63324c462c560543ee40fd353258 # v1
        env:
          # Use baked image config, not workspace .mega-linter.yml.
          # The workspace EXTENDS points at main which may not have latest plugins.
          # TODO: remove this env after first image rebuild with PR #35 changes.
          MEGALINTER_CONFIG: /opt/coding-standards/.mega-linter.yml

      - name: Upload MegaLinter report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: megalinter-report
          path: megalinter-reports/
          retention-days: 2
