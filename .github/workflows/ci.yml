---
# Self-test — uses the composite action on this repo to verify it works.
#
# This is the dogfood loop: if CI passes, the action works.
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (self-test)
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Use the action from this repo (local path = ./)
      - uses: ./
        with:
          skip-hooks: commitlint
