---
# Self-test — calls the reusable lint workflow from this repo.
#
# This is the dogfood loop: if CI passes, the workflow works.
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    uses: ./.github/workflows/lint.yml
    with:
      skip-hooks: commitlint
