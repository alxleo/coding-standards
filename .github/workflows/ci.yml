---
# CI — two-tier feedback.
#   1. Fast checks: `just check` — same command locally and in CI
#   2. Image self-lint (via composite action): runs the published image
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-checks:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: false

      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: just check
        run: just check

  # Image self-lint — runs the published image against this repo.
  self-lint:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # Run image with branch configs mounted over baked configs.
      # This eliminates the chicken-and-egg: :latest image may be old,
      # but it gets current configs from the branch.
      - name: Self-lint (image + branch configs)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/tmp/lint" \
            -v "${{ github.workspace }}/lint-configs-626465:/opt/coding-standards/configs" \
            -v "${{ github.workspace }}/semgrep-rules:/opt/coding-standards/semgrep-rules" \
            -v "${{ github.workspace }}/policies:/opt/coding-standards/policies" \
            -v "${{ github.workspace }}/plugins:/mega-linter-plugin-custom" \
            -v "${{ github.workspace }}/scripts:/opt/coding-standards/scripts" \
            -v "${{ github.workspace }}/.mega-linter-default.yml:/opt/coding-standards/.mega-linter-default.yml" \
            -e DEFAULT_WORKSPACE=/tmp/lint \
            ghcr.io/alxleo/coding-standards:latest

      - name: Upload MegaLinter report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: megalinter-report
          path: megalinter-reports/
          retention-days: 2
