---
# CI — two-tier feedback.
#   1. Fast checks: pre-commit runs ALL hooks (ruff, pytest, semgrep, catalog, etc)
#   2. Image self-lint (via composite action): runs the published image
#
# Single source of truth: lint-configs-626465/.pre-commit-config.yaml
# Same command locally: just check
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Fast feedback — no Docker, no image pull. Pre-commit runs everything.
  fast-checks:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: false

      - name: Pre-commit (all checks)
        env:
          SKIP: just-fmt-check,caddy-fmt-check,hadolint-docker
        run: |
          # Self-test: this repo IS coding-standards, so .coding-standards → .
          [ -L .coding-standards ] || ln -s . .coding-standards
          uvx pre-commit run --all-files -c lint-configs-626465/.pre-commit-config.yaml

  # Image self-lint — runs the published image against this repo.
  # Uses :latest from GHCR (tests the shipped image, not local changes).
  self-lint:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: alxleo/coding-standards/docker-action@18575725c90d63324c462c560543ee40fd353258 # v1

      - name: Upload MegaLinter report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: megalinter-report
          path: megalinter-reports/
          retention-days: 2
