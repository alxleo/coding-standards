---
# Build and push the coding-standards MegaLinter Docker image.
#
# Triggers:
#   - Push to main (code/config changes) — production image
#   - Daily schedule (refresh trivy DB + schemas)
#   - Manual dispatch (emergency rebuild)
#   - PR (build-only, no push — tests the Dockerfile)
name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
      - policies/**
      - semgrep-rules/**
  schedule:
    # Daily at 03:00 UTC — refreshes trivy vuln DB + schemas
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
      - policies/**
      - semgrep-rules/**

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alxleo/coding-standards

jobs:
  build:
    # Skip expensive Docker builds on bot PRs (Renovate digest bumps).
    # The image only matters at merge time.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value={{date 'YYYY-MM-DD'}},enable=${{ github.event_name == 'schedule' }}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern=v{{major}},enable=${{ github.ref_type == 'tag' }}

      # Build locally first (don't push yet) — scan + test before push
      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test
          cache-from: type=gha
          # Only export cache on non-PR builds (PR cache export wastes 60-120s)
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=min' || '' }}

      # Scan the built image for vulnerabilities before pushing
      # .trivyignore covers Go stdlib CVEs in upstream binaries we can't rebuild
      - name: Trivy image scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/.trivyignore:/root/.trivyignore" \
            ghcr.io/aquasecurity/trivy:0.69.3 image \
            --severity CRITICAL \
            --ignore-unfixed \
            --ignorefile /root/.trivyignore \
            --exit-code 1 \
            --scanners vuln \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test

      # Smoke test — verify all custom tools from .ci.json
      - name: Smoke test
        run: |
          img="${REGISTRY}/${IMAGE_NAME}:ci-test"
          echo "Testing tool availability..."
          jq -r '.test_commands[]' .ci.json | while IFS= read -r cmd; do
            echo "  → $cmd"
            docker run --rm --entrypoint="" "$img" sh -c "$cmd"
          done
          echo "All tools verified."

      # Push only after scan + smoke test pass, and only on non-PR builds
      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
