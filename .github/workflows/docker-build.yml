---
# Build and push the coding-standards MegaLinter Docker image.
#
# Triggers:
#   - Push to main (code/config changes) — production image
#   - Weekly schedule (rebuild + trivy scan)
#   - Manual dispatch (emergency rebuild)
#   - PR (build-only, no push — tests the Dockerfile)
name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - .trivyignore
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
      - policies/**
      - semgrep-rules/**
  schedule:
    # Weekly Monday 03:00 UTC — rebuilds image + trivy scan
    - cron: "0 3 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - .trivyignore
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
      - policies/**
      - semgrep-rules/**

concurrency:
  group: docker-${{ github.ref }}
  # Only cancel in-progress on PRs — don't cancel main pushes or tag releases
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alxleo/coding-standards
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Skip expensive Docker builds on bot PRs (Renovate digest bumps).
    # The image only matters at merge time.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # BuildKit image mirrored to GHCR — avoids Docker Hub rate limits entirely.
      # docker.io mirror via mirror.gcr.io for base image pulls.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: image=ghcr.io/alxleo/buildkit:v0.20.2
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value={{date 'YYYY-MM-DD'}},enable=${{ github.event_name == 'schedule' }}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern=v{{major}},enable=${{ github.ref_type == 'tag' }}

      # Build locally first (don't push yet) — scan + test before push
      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test
          cache-from: type=gha,scope=coding-standards
          # Only export cache on non-PR builds (PR cache export wastes 60-120s)
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=coding-standards,mode=min' || '' }}

      # Trivy vulnerability scan — schedule only.
      # CVEs are in the base image, not our code. New upstream CVEs block CI until
      # added to .trivyignore — friction with no security value on pushes.
      # The daily scheduled build catches new CVEs without blocking development.
      - name: Trivy vulnerability scan
        if: github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: .trivyignore

      # Image efficiency check — catch wasted space in layers
      - name: Dive layer analysis
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:latest \
            --ci --lowestEfficiency=0.9 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test || true

      # Smoke test — verify all custom tools from .ci.json
      - name: Smoke test
        run: |
          img="${REGISTRY}/${IMAGE_NAME}:ci-test"
          echo "Testing tool availability..."
          jq -r '.test_commands[]' .ci.json | while IFS= read -r cmd; do
            echo "  → $cmd"
            docker run --rm --entrypoint="" "$img" sh -c "$cmd"
          done
          echo "All tools verified."

      # Entrypoint command tests — verify the command router works
      - name: Test entrypoint commands
        run: |
          img="${REGISTRY}/${IMAGE_NAME}:ci-test"
          echo "Testing entrypoint commands..."

          echo "  → help"
          docker run --rm "$img" help | grep -q "Commands:"

          echo "  → catalog"
          docker run --rm "$img" catalog | grep -q "Coding Standards Catalog"

          echo "  → standards (against empty workspace)"
          docker run --rm -v "$(mktemp -d):/tmp/lint" -e DEFAULT_WORKSPACE=/tmp/lint "$img" standards || true

          echo "  → lint (single linter, no workspace needed for --help)"
          docker run --rm "$img" help | grep -q "lint \[LINTER\]"

          echo "All entrypoint commands verified."

      # Catalog drift check
      - name: Check catalog is up to date
        run: |
          img="${REGISTRY}/${IMAGE_NAME}:ci-test"
          docker run --rm --entrypoint="" "$img" \
            python3 /opt/coding-standards/scripts/generate-catalog.py --check

      # Push via docker tag + push (no second buildx build needed).
      # The image is already loaded in the daemon from the build step.
      - name: Push image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag "${REGISTRY}/${IMAGE_NAME}:ci-test" "$tag"
            docker push "$tag"
          done
