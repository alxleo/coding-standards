---
# Build and push the coding-standards MegaLinter Docker image.
#
# Triggers:
#   - Push to main (code/config changes) — production image
#   - Daily schedule (refresh trivy DB + schemas)
#   - Manual dispatch (emergency rebuild)
#   - PR (build-only, no push — tests the Dockerfile)
name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
  schedule:
    # Daily at 03:00 UTC — refreshes trivy vuln DB + schemas
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - lint-configs-626465/**
      - plugins/**
      - scripts/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alxleo/coding-standards

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value={{date 'YYYY-MM-DD'}},enable=${{ github.event_name == 'schedule' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
