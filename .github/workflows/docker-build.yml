---
# Build and push the coding-standards MegaLinter Docker image.
#
# Triggers:
#   - Push to main (code/config changes) — production image
#   - Daily schedule (refresh trivy DB + schemas)
#   - Manual dispatch (emergency rebuild)
#   - PR (build-only, no push — tests the Dockerfile)
name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
      - policies/**
      - semgrep-rules/**
  schedule:
    # Daily at 03:00 UTC — refreshes trivy vuln DB + schemas
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .mega-linter-default.yml
      - lint-configs-626465/**
      - plugins/**
      - scripts/**
      - policies/**
      - semgrep-rules/**

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alxleo/coding-standards

jobs:
  build:
    # Skip expensive Docker builds on bot PRs (Renovate digest bumps).
    # The image only matters at merge time.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value={{date 'YYYY-MM-DD'}},enable=${{ github.event_name == 'schedule' }}
            type=sha,prefix=sha-

      # Build locally first (don't push yet) — scan + test before push
      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test
          cache-from: type=gha
          # Only export cache on non-PR builds (PR cache export wastes 60-120s)
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=min' || '' }}

      # Scan the built image for vulnerabilities before pushing
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-test
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          scanners: vuln

      # Smoke test — verify all custom tools are installed and working
      - name: Smoke test
        run: |
          img="${REGISTRY}/${IMAGE_NAME}:ci-test"
          echo "Testing tool availability..."
          docker run --rm --entrypoint="" "$img" trivy --version
          docker run --rm --entrypoint="" "$img" pmd --version
          docker run --rm --entrypoint="" "$img" caddy version
          docker run --rm --entrypoint="" "$img" just --version
          docker run --rm --entrypoint="" "$img" conftest --version
          docker run --rm --entrypoint="" "$img" npx commitlint --version  # npx inside image (version pinned in Dockerfile)
          docker run --rm --entrypoint="" "$img" pyright --version
          docker run --rm --entrypoint="" "$img" zizmor --version
          docker run --rm --entrypoint="" "$img" knip --version
          docker run --rm --entrypoint="" "$img" dclint --version
          docker run --rm --entrypoint="" "$img" tsc --version
          docker run --rm --entrypoint="" "$img" depcruise --version
          docker run --rm --entrypoint="" "$img" license-checker --version
          echo "All tools verified."

      # Push only after scan + smoke test pass, and only on non-PR builds
      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
