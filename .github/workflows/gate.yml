# This workflow exists solely to enable "require branch up-to-date before merge"
# in GitHub rulesets. GitHub can't enforce that without at least one required
# status check — this is that check. It does nothing else.
name: Merge gate

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  branch-up-to-date:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: exit 0
