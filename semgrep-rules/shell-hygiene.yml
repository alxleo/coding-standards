rules:
  - id: no-bare-python
    message: >
      Use 'uv run python3' instead of bare 'python3' to ensure
      consistent virtual environment and dependency management.
    languages: [bash]
    severity: WARNING
    patterns:
      - pattern-regex: '(?:^|\s)python3?\s'
      - pattern-not-regex: "uv run python3?"
      - pattern-not-regex: "#.*python3?"
    paths:
      include:
        - "*.sh"
        - scripts/

  - id: temp-file-needs-trap
    message: >
      Scripts using mktemp or writing to /tmp must include
      'trap ... EXIT' for cleanup.
    languages: [generic]
    severity: ERROR
    pattern-regex: "mktemp"
    paths:
      include:
        - "*.sh"
        - scripts/
    metadata:
      requires-also: "trap .* EXIT"

  - id: pin-npm-versions
    message: >
      npx invocations must pin a version (e.g., npx jscpd@4.0.8).
      Unpinned npx pulls latest, which breaks reproducibility.
    languages: [generic]
    severity: WARNING
    pattern-regex: 'npx\s+[a-z][a-z0-9-]+(?!\s*@|\s+--)'
    paths:
      include:
        - "*.sh"
        - "*.yml"
        - "*.yaml"
        - Dockerfile
