rules:
  - id: coding-standards.python-silent-fallback-or
    patterns:
      - pattern-either:
          - pattern: $OBJ.get(...) or $DEFAULT
          - pattern: os.environ.get(...) or $DEFAULT
          - pattern: os.getenv(...) or $DEFAULT
      - pattern-not: any(...)
    message: >
      Silent fallback: `.get() or $DEFAULT` treats falsy values (0, "", [])
      the same as missing keys. Use the default parameter instead:
        - dict.get(key) or [] → dict.get(key, [])
        - os.environ.get("K") or "v" → os.environ.get("K", "v")
        - os.getenv("K") or "v" → os.getenv("K", "v")
      Last resort: `# nosemgrep: python-silent-fallback-or`
    languages: [python]
    severity: INFO
    paths:
      exclude:
        - "**/test*"
        - "**/tests*"
    metadata:
      category: maintainability
      technology: [python]

  - id: coding-standards.python-bare-except-pass
    pattern: |
      except:
          pass
    message: >
      Bare except with pass swallows all errors including KeyboardInterrupt.
      Catch a specific exception, or at minimum log the error.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      technology: [python]

  - id: coding-standards.javascript-silent-catch
    pattern: |
      catch ($ERR) {}
    message: >
      Empty catch block silently swallows errors. Either handle the error,
      re-throw, or add a comment explaining why it's safe to ignore.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: correctness
      technology: [javascript]
