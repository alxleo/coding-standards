# Ruff baseline — synced to all repos.
# Consumer repos override by placing ruff.toml in their root.

target-version = "py311"
line-length = 120

[lint]
select = [
  # Core
  "E",       # pycodestyle errors
  "W",       # pycodestyle warnings
  "F",       # pyflakes
  "I",       # isort
  "N",       # pep8-naming
  # Bug prevention
  "B",       # flake8-bugbear
  "S",       # flake8-bandit (security)
  "BLE",     # blind exceptions
  "SIM",     # flake8-simplify
  "C4",      # flake8-comprehensions
  "RUF",     # ruff-specific rules
  "PIE",     # flake8-pie
  "ISC",     # implicit string concatenation
  "A",       # flake8-builtins (shadowing list, dict, type, id)
  "INP",     # implicit namespace packages (missing init files)
  # Pylint (full categories, not cherry-picked — catches new rules on ruff upgrades)
  "PLC",     # pylint convention
  "PLE",     # pylint error
  "PLR",     # pylint refactor
  "PLW",     # pylint warning
  # Modernization
  "UP",      # pyupgrade
  "FURB",    # modernize patterns for Python 3.11+
  "PTH",     # pathlib: os.path → pathlib
  "FA",      # future annotations (deferred evaluation, pairs with TCH)
  # Performance
  "PERF",    # performance anti-patterns
  "C90",     # mccabe cyclomatic complexity
  # Type safety
  "TCH",     # move type-only imports to TYPE_CHECKING
  "PGH",     # blanket type-ignore / noqa without codes
  "FBT",     # boolean positional args
  "ARG",     # unused function arguments
  # Exception handling
  "TRY",     # tryceratops
  "EM",      # flake8-errmsg (greppable exception messages)
  # Code quality
  "RET",     # return style
  "RSE",     # raise style
  "SLF",     # private member access from outside class
  "ERA",     # commented-out code
  "DTZ",     # naive datetimes
  "T20",     # print statements (use logging)
  "LOG",     # logging anti-patterns
  "PT011",   # pytest.raises() without match=
]
# ISC001: conflicts with ruff formatter (produces code that ISC001 flags).
# FURB110: "use or instead of ternary" conflicts with our semgrep
#   python-silent-fallback-or rule which correctly flags or-fallbacks.
#   The ternary is the idiomatic fix semgrep recommends.
# TRY300: moving return to else block is less readable in simple key-walk patterns.
extend-per-file-ignores = { "**" = ["ISC001", "FURB110", "TRY300"] }

[lint.per-file-ignores]
# Test files: allow assert, /tmp, subprocess, magic values, unused args, inline imports, private access
"test/**" = ["S101", "S108", "S603", "S607", "PLR2004", "ARG", "PLC0415", "T20", "SLF001", "INP001"]
"test_*" = ["S101", "S108", "S603", "S607", "PLR2004", "ARG", "PLC0415", "T20", "SLF001", "INP001"]
# Scripts: standalone files (not packages), allow /tmp, urllib, subprocess, print
# PLC0415: some scripts use deferred imports for optional deps (blast_radius, manifest_schema).
# ERA001: false-positives on nosemgrep comments. INP001: scripts/ is not a package.
"scripts/**" = ["S108", "S310", "S603", "S607", "T20", "PLC0415", "ERA001", "INP001"]

[lint.mccabe]
max-complexity = 12

[lint.pylint]
max-args = 8

[format]
quote-style = "double"
