# Hadolint baseline — synced to all repos.
# Per-repo overrides: add `ignore:` entries with documented reasoning.

trustedRegistries:
  - docker.io
  - ghcr.io

# Tightened rules for LLM-generated Dockerfiles.
# LLMs routinely omit version pins and --no-install-recommends.
failure-threshold: warning

strict-labels: true

# Promote useful rules that default below warning threshold.
override:
  warning:
    - DL3047 # wget without --progress — bloats build logs
    - DL3045 # COPY to relative path without WORKDIR — common LLM mistake
  info:
    - DL3002 # Last USER is root — advisory only, conftest policies handle with stage awareness

ignored:
  - DL3059 # Multiple consecutive RUN — intentional for layer caching
