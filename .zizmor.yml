# zizmor configuration — suppress known false positives
rules:
  excessive-permissions:
    ignore:
      # Composite/Docker actions can't set permissions — only workflows can.
      - action.yml
      - docker-action/action.yml
  cache-poisoning:
    ignore:
      # Pre-commit + UV caches: deterministic tool installs keyed on lock file hashes.
      # Not build artifacts — cache poisoning risk is negligible.
      - .github/workflows/ci.yml
      - .github/workflows/scheduled.yml
