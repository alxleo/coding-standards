# Remote pre-commit config — for consumer repos that fetch coding-standards.
# Identical to .pre-commit-config.yaml except tools that need config files
# get explicit --config args pointing to .coding-standards/configs/.
#
# Usage: uvx pre-commit run --all-files --config .coding-standards/configs/.pre-commit-config.remote.yaml

repos:
  # ── Standard hygiene ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ── Secret scanning ──────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
        args: [--config, .coding-standards/configs/.gitleaks.toml]

  # ── Typo detection ──────────────────────────────────────────
  - repo: https://github.com/crate-ci/typos
    rev: v1.44.0
    hooks:
      - id: typos

  # ── GitHub Actions linting ─────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor

  # ── Markdown linting ───────────────────────────────────────
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        args: [--config, .coding-standards/configs/.markdownlint-cli2.yaml]

  # ── Commit message linting ─────────────────────────────────
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
        args: [--config, .coding-standards/configs/commitlint.config.mjs]

  # ── Python linting + formatting ────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Cruft & secrets blocking ─────────────────────────────────
  - repo: local
    hooks:
      - id: forbid-cruft-files
        name: Block cruft files (.bak, .del, .tmp, .old, .orig)
        entry: "Found cruft file — delete or rename before committing"
        language: fail
        files: \.(bak|del|tmp|old|orig|swp|swo)$

      - id: block-secret-files
        name: Block secret files
        entry: "Secret/env files must not be committed"
        language: fail
        files: (\.env$|\.env\.|\.secrets\.|\.key$|\.pem$|\.age$|sops\.yaml$)
        exclude: \.secrets\.ya?ml$

      - id: verify-sops-encryption
        name: Verify SOPS files are encrypted
        entry: "bash -c 'for f in \"$@\"; do if ! grep -q \"^sops:\" \"$f\" 2>/dev/null; then echo \"ERROR: $f is not SOPS-encrypted\"; exit 1; fi; done' --"
        language: system
        files: \.secrets\.yaml$

  # ── Shell hygiene ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: pin-npm-versions
        name: Require pinned npm/npx versions
        entry: "bash -c 'FOUND=0; for f in \"$@\"; do if grep -nE \"npx [a-z]\" \"$f\" | grep -vE \"npx (--yes|--no|-)|@[0-9]|^[^:]*:#|^[^:]*:.*name:\"; then FOUND=1; fi; done; exit $FOUND' --"
        language: system
        types_or: [shell, yaml]

      - id: temp-file-needs-trap
        name: Shell temp files need trap cleanup
        entry: "bash -c 'for f in \"$@\"; do if grep -q \"mktemp\" \"$f\" && ! grep -q \"trap\" \"$f\"; then echo \"ERROR: $f uses mktemp without trap EXIT cleanup\"; exit 1; fi; done' --"
        language: system
        types: [shell]

      - id: forbid-bare-python
        name: Use uv run, not bare python/python3
        entry: "bash -c 'FOUND=0; for f in \"$@\"; do if grep -nE \"(^|[[:space:]])python3?[[:space:]]\" \"$f\" | grep -v \"uv run\"; then FOUND=1; fi; done; exit $FOUND' --"
        language: system
        types: [shell]

  # ── Justfile formatting ─────────────────────────────────────
  - repo: local
    hooks:
      - id: just-fmt-check
        name: Check justfile formatting
        entry: just --fmt --check
        language: system
        files: (^|/)justfile$
        pass_filenames: false
