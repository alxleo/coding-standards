# coding-standards baseline MegaLinter configuration
# Baked into Docker image. Consumer repos override via their own .mega-linter.yml.
#
# Activation: allowlist (ENABLE_LINTERS). New MegaLinter versions don't change
# what runs. Consumer repos that need a different set copy and amend this list.

# ── Linter activation (allowlist) ─────────────────────────────
ENABLE_LINTERS:
  # Shell
  - BASH_SHELLCHECK
  - BASH_SHFMT
  # Python
  - PYTHON_RUFF
  - PYTHON_PYRIGHT
  - PYTHON_VULTURE
  # YAML
  - YAML_YAMLLINT
  - YAML_PRETTIER
  - YAML_V8R
  # JSON
  - JSON_PRETTIER
  - JSON_V8R
  # Markdown
  - MARKDOWN_RUMDL
  # Dockerfile
  - DOCKERFILE_HADOLINT
  - DOCKERFILE_DCLINT
  # GitHub Actions
  - ACTION_ACTIONLINT
  # Terraform
  - TERRAFORM_TFLINT
  # Editorconfig
  - EDITORCONFIG_EDITORCONFIG_CHECKER
  # Copy-paste (PMD-CPD replaces jscpd — 50x faster)
  - COPYPASTE_PMD_CPD
  # Spelling
  - SPELL_CODESPELL
  # Links
  - SPELL_LYCHEE
  # Secrets
  - REPOSITORY_GITLEAKS
  # Security (SAST)
  - REPOSITORY_SEMGREP
  # Security (vuln + IaC)
  - REPOSITORY_TRIVY_CUSTOM
  # Structural policy (Conftest/OPA)
  - REPOSITORY_CONFTEST
  # Repo standards (setup validation via manifest)
  - REPOSITORY_REPO_STANDARDS
  # GHA security
  - REPOSITORY_ZIZMOR
  # Commits
  - REPOSITORY_COMMITLINT
  # JS/TS
  - JAVASCRIPT_ES
  - TYPESCRIPT_ES
  - JSX_ESLINT
  - TSX_ESLINT
  - JAVASCRIPT_PRETTIER
  - TYPESCRIPT_PRETTIER
  # JS/TS type checking + coverage
  - TYPESCRIPT_TSC
  - REPOSITORY_TYPE_COVERAGE
  # JS/TS fast pre-pass (correctness + suspicious)
  - REPOSITORY_OXLINT
  # JS/TS project analyzers
  - REPOSITORY_KNIP
  - REPOSITORY_DEPENDENCY_CRUISER
  - REPOSITORY_NPM_AUDIT
  - REPOSITORY_LICENSE_CHECKER
  - REPOSITORY_PUBLINT
  - REPOSITORY_ATTW
  # Python project analyzers
  - REPOSITORY_DEPTRY
  - REPOSITORY_IMPORT_LINTER
  # CSS
  - CSS_STYLELINT
  # SQL
  - SQL_SQLFLUFF
  # API contract validation
  - API_SPECTRAL
  # Ansible
  - ANSIBLE_ANSIBLE_LINT
  # Kubernetes
  - KUBERNETES_KUBECONFORM
  # Formatting
  - REPOSITORY_CADDY_FMT
  - REPOSITORY_JUST_FMT
  # Filename conventions (cross-language)
  - REPOSITORY_LS_LINT
  # Environment files
  - ENV_DOTENV_LINTER
  # Makefile
  - MAKEFILE_CHECKMAKE
  # Go
  - GO_GOLANGCI_LINT
  # Git
  - REPOSITORY_GIT_DIFF
  # Change impact analysis
  - REPOSITORY_BLAST_RADIUS

# ── Blocking policy (two tiers) ──────────────────────────────
# Tier 1: everything not listed below BLOCKS the build
# Tier 2: warn but don't fail
DISABLE_ERRORS_LINTERS:
  # Formatters (auto-fixable via cs-fix, warn so they don't block before fixing)
  - JAVASCRIPT_PRETTIER
  - TYPESCRIPT_PRETTIER
  - JSON_PRETTIER
  - YAML_PRETTIER
  - MARKDOWN_RUMDL
  - CSS_STYLELINT
  # Style/advisory (judgement calls, not bugs)
  - COPYPASTE_PMD_CPD
  - EDITORCONFIG_EDITORCONFIG_CHECKER
  - SPELL_LYCHEE
  - SPELL_CODESPELL
  - JSON_V8R
  - YAML_V8R
  - DOCKERFILE_DCLINT
  - REPOSITORY_REPO_STANDARDS
  - REPOSITORY_LS_LINT
  - REPOSITORY_OXLINT
  - REPOSITORY_TYPE_COVERAGE
  - GO_GOLANGCI_LINT
  - MAKEFILE_CHECKMAKE
  - REPOSITORY_BLAST_RADIUS
  - PYTHON_VULTURE
  - REPOSITORY_IMPORT_LINTER
  - REPOSITORY_PUBLINT
  - REPOSITORY_ATTW
  - ENV_DOTENV_LINTER
  - API_SPECTRAL

# ── Per-linter configuration ──────────────────────────────────
# _CONFIG_FILE is sufficient — MegaLinter auto-passes it as the correct CLI
# flag via cli_config_arg_name in each descriptor. DO NOT add _ARGUMENTS with
# config paths — it short-circuits consumer overrides.
# (Verified: all CLI-based linters below have cli_config_arg_name defined.
# v8r is the exception — it uses cosmiconfig discovery, not a CLI flag.)
#
# Consumer repos override by setting <LINTER>_CONFIG_FILE in their .mega-linter.yml.

# shellcheck: --rcfile points at .mega-linter-config/.shellcheckrc (no root pollution).
BASH_SHELLCHECK_ARGUMENTS:
  - "--rcfile=.mega-linter-config/.shellcheckrc"
# editorconfig-checker: .editorconfig MUST be at project root per EditorConfig spec.
# The -config flag is for .ecrc (tool config), not .editorconfig. Stays in PRE_COMMANDS root copy.
# rumdl: custom plugin with cli_config_arg_name: --config. Clean _CONFIG_FILE.
MARKDOWN_RUMDL_CONFIG_FILE: .markdownlint-cli2.yaml
REPOSITORY_COMMITLINT_CONFIG_FILE: commitlint.config.mjs
REPOSITORY_ZIZMOR_CONFIG_FILE: .zizmor.yml
REPOSITORY_ZIZMOR_UNSECURED_ENV_VARIABLES: GITHUB_TOKEN
PYTHON_PYRIGHT_CONFIG_FILE: pyrightconfig.json
# Pyright exits non-zero on errors only (not warnings) by default, but --level
# error suppresses warning output entirely. This prevents missing-import warnings
# (reportMissingImports: "warning" in pyrightconfig.json) from cluttering output
# in consumer repos that lack extraPaths for their venv. Real type errors still block.
PYTHON_PYRIGHT_ARGUMENTS:
  - "--level"
  - "error"
PYTHON_VULTURE_ARGUMENTS:
  - "--min-confidence"
  - "80"
SPELL_LYCHEE_CONFIG_FILE: .lychee.toml
PYTHON_RUFF_CONFIG_FILE: ruff.toml
REPOSITORY_LS_LINT_ARGUMENTS:
  - "-config"
  - ".mega-linter-config/.ls-lint.yml"
API_SPECTRAL_CONFIG_FILE: .spectral.yaml
JAVASCRIPT_ES_CONFIG_FILE: eslint.config.mjs
TYPESCRIPT_ES_CONFIG_FILE: eslint.config.mjs
JSX_ESLINT_CONFIG_FILE: eslint.config.mjs
TSX_ESLINT_CONFIG_FILE: eslint.config.mjs
TERRAFORM_TFLINT_CONFIG_FILE: .tflint.hcl
TERRAFORM_TFLINT_UNSECURED_ENV_VARIABLES: GITHUB_TOKEN
YAML_YAMLLINT_CONFIG_FILE: .yamllint
DOCKERFILE_HADOLINT_CONFIG_FILE: .hadolint.yaml
JSON_PRETTIER_CONFIG_FILE: .prettierrc
YAML_PRETTIER_CONFIG_FILE: .prettierrc
JAVASCRIPT_PRETTIER_CONFIG_FILE: .prettierrc
TYPESCRIPT_PRETTIER_CONFIG_FILE: .prettierrc
REPOSITORY_GITLEAKS_CONFIG_FILE: .gitleaks.toml
# editorconfig-checker: _CONFIG_FILE expects an .ecrc (tool config), not .editorconfig.
# The tool auto-discovers .editorconfig from the workspace root (copied via PRE_COMMANDS).
SPELL_CODESPELL_ARGUMENTS:
  - "--config=.mega-linter-config/.codespellrc"
# v8r: uses cosmiconfig auto-discovery, not CLI flags.
# YAML_V8R works via _CONFIG_FILE (descriptor has no cli_config_arg_name).
# JSON_V8R MUST NOT set _CONFIG_FILE — its built-in descriptor injects -c
# (which means --catalogs, not config). Cosmiconfig finds it via PRE_COMMANDS symlink.
# v8r: cosmiconfig auto-discovers .v8rrc.yml from cwd. Symlink from
# .mega-linter-config/ to workspace root so v8r finds it without root pollution.
# Consumer override: place own .v8rrc.yml at repo root (skips symlink via test -f).
YAML_V8R_CONFIG_FILE: .v8rrc.yml

# Kubeconform: --strict rejects unknown fields (catches typos in manifests)
KUBERNETES_KUBECONFORM_ARGUMENTS:
  - "--strict"

# Semgrep: cached rulesets (no network at runtime).
# Rules downloaded as JSON at Docker build time — 381x faster to parse than YAML.
# Refreshed on every image rebuild (weekly scheduled + every merge to main).
# Custom rules in semgrep-rules/ are always local.
# Rule ID prefixes: rules.security-audit.<id>, rules.trailofbits.<id>, rules.custom.<id>
# Consumers can --exclude-rule with these predictable short prefixes.
REPOSITORY_SEMGREP_RULESETS:
  - /rules/security-audit.json
  - /rules/trailofbits.json
  - /rules/custom/

# Exclude upstream rules replaced by network-aware versions in
# semgrep-rules/network-security.yml (see #82)
REPOSITORY_SEMGREP_ARGUMENTS:
  - "--exclude=semgrep-rules" # don't scan rule definitions (patterns contain http://, curl, etc.)
  - "--exclude-rule=trailofbits.yaml.docker-compose.port-all-interfaces.port-all-interfaces"
  - "--exclude-rule=trailofbits.generic.curl-unencrypted-url.curl-unencrypted-url"
  - "--exclude-rule=trailofbits.generic.wget-unencrypted-url.wget-unencrypted-url"
  - "--exclude-rule=trailofbits.generic.postgres-insecure-sslmode.postgres-insecure-sslmode"

# ── Formatting / style ────────────────────────────────────────
FORMATTERS_DISABLE_ERRORS: true # formatters warn, don't block (explicit)
JAVASCRIPT_DEFAULT_STYLE: prettier # not standard
TYPESCRIPT_DEFAULT_STYLE: prettier

# ── Safety ────────────────────────────────────────────────────
FAIL_IF_MISSING_LINTER_IN_FLAVOR: true # catch Dockerfile mistakes

# ── Auto-fix (caller-controlled) ─────────────────────────────
# Default: check only. Pass -e APPLY_FIXES=all to auto-fix.
APPLY_FIXES: none

# ── Reporters ─────────────────────────────────────────────────
CONSOLE_REPORTER: true
TEXT_REPORTER: true
JSON_REPORTER: true
JSON_REPORTER_OUTPUT_DETAIL: detailed
MARKDOWN_SUMMARY_REPORTER: true
TAP_REPORTER: false # CRITICAL: breaks project-mode linters
SARIF_REPORTER: false
GITHUB_STATUS_REPORTER: false # we post statuses ourselves (Gitea + GitHub)
GITHUB_COMMENT_REPORTER: false
CONFIG_REPORTER: false
UPDATED_SOURCES_REPORTER: false
FILEIO_REPORTER: false
EMAIL_REPORTER: false
API_REPORTER: false

# ── Performance ───────────────────────────────────────────────
PARALLEL: true
PARALLEL_PROCESS_NUMBER: 8
SHOW_ELAPSED_TIME: true
PRINT_ALPACA: false
PRINT_ALL_FILES: false
FLAVOR_SUGGESTIONS: false
SHOW_SKIPPED_LINTERS: false

# ── File filtering ────────────────────────────────────────────
VALIDATE_ALL_CODEBASE: true
IGNORE_GENERATED_FILES: true
IGNORE_GITIGNORED_FILES: true
ADDITIONAL_EXCLUDED_DIRECTORIES:
  - megalinter-reports
  - .terraform
  - .terragrunt-cache
  - __pycache__
  - .mypy_cache
  - .ruff_cache
  - coverage
  - .nyc_output
  - .next
  - .nuxt

# ── Linter config files ──────────────────────────────────────
# Configs baked into image. Consumer repos override specific tools via
# <LINTER>_CONFIG_FILE pointing at their workspace file.
LINTER_RULES_PATH: /opt/coding-standards/configs

# ── Security ──────────────────────────────────────────────────
SECURED_ENV_VARIABLES:
  - GITEA_TOKEN

# ── Report cleanup ────────────────────────────────────────────
CLEAR_REPORT_FOLDER: true

# ── PRE_COMMANDS ──────────────────────────────────────────────
PRE_COMMANDS:
  # Fix Docker UID mismatch + CRLF
  - command: >-
      git config --global --add safe.directory '*' &&
      git config --global core.autocrlf input
    cwd: workspace
    continue_if_failed: true
  # Generate repo manifest for repo-standards validation
  - command: >-
      python3 /opt/coding-standards/scripts/generate_repo_manifest.py
    cwd: workspace
    continue_if_failed: true
  # Copy baked configs to .mega-linter-config/ — keeps consumer workspace clean.
  # Consumer overrides: place own config file (checked via test ! -f).
  # Exceptions: .editorconfig at root (EditorConfig spec), .v8rrc.yml symlinked
  # to root (cosmiconfig only searches project root).
  - command: >-
      mkdir -p .mega-linter-config &&
      for f in .shellcheckrc .codespellrc .ls-lint.yml .v8rrc.yml; do
        test ! -f ".mega-linter-config/$f" &&
          cp "/opt/coding-standards/configs/$f" ".mega-linter-config/$f" 2>/dev/null || true;
      done &&
      test ! -f .editorconfig &&
        cp /opt/coding-standards/configs/.editorconfig .editorconfig 2>/dev/null || true &&
      test ! -f .v8rignore &&
        cp /opt/coding-standards/configs/.v8rignore .v8rignore 2>/dev/null || true &&
      test ! -f .v8rrc.yml && test -f .mega-linter-config/.v8rrc.yml &&
        ln -sf .mega-linter-config/.v8rrc.yml .v8rrc.yml 2>/dev/null || true
    cwd: workspace
    continue_if_failed: true
  # Install JS deps if package-lock.json exists
  # (needed for knip, dep-cruiser, tsc)
  - command: >-
      test -f package-lock.json &&
      npm ci --ignore-scripts || true
    cwd: workspace
    continue_if_failed: true

# ── POST_COMMANDS ─────────────────────────────────────────────
POST_COMMANDS:
  # Fix file ownership for self-hosted runners. Container runs as root,
  # creating files the runner user can't clean up. Restore ownership to
  # the original workspace owner (passed via WORKSPACE_UID/GID env vars).
  # nosemgrep: coding-standards.unexpanded-env-var-in-yaml — shell vars in command block
  - command: >-
      if [ -n "${WORKSPACE_UID:-}" ]; then
        chown -R "${WORKSPACE_UID}:${WORKSPACE_GID:-${WORKSPACE_UID}}" . 2>/dev/null || true;
      fi
    cwd: workspace
    continue_if_failed: true

# ── Plugins (custom tools baked into image) ───────────────────
PLUGINS:
  - "file:///mega-linter-plugin-custom/commitlint.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/trivy.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/dclint.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/zizmor.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/caddy-fmt.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/just-fmt.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/knip.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/dependency-cruiser.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/npm-audit.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/license-checker.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/tsc.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/pmd-cpd.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/conftest.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/repo-standards.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/vulture.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/deptry.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/import-linter.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/oxlint.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/type-coverage.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/publint.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/attw.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/rumdl.megalinter-descriptor.yml"
  - "file:///mega-linter-plugin-custom/blast-radius.megalinter-descriptor.yml"
